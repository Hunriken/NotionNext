<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>播放器 - 单列表（内置侧栏）</title>

  <!-- DPlayer 样式 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css" />

  <style>
    /* 页面与容器：去掉白色背景，适合嵌入 Notion */
    html,body {
      height:100%;
      margin:0;
      background:transparent;
      font-family: "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      color:#fff;
    }

    .wrap {
      width:100%;
      max-width:1200px;
      margin:0 auto;
      padding:12px;
      box-sizing:border-box;
    }

    /* 播放器区域：黑色背景以突出视频 */
    .player-shell {
      position:relative;
      background:#000;
      border-radius:8px;
      overflow:hidden;
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      gap:0;
    }

    /* DPlayer 容器占据左侧，右侧为内嵌播放列表 */
    #dplayer-container {
      width: calc(100% - 340px); /* 留出右侧列表宽度 + 间距 */
      height: 64vh;
      min-height:360px;
      background:#000;
    }

    /* 侧边播放列表（内嵌在播放器内） */
    .playlist-panel {
      width:320px;
      height:100%;
      box-sizing:border-box;
      padding:12px;
      position:relative;
      display:flex;
      flex-direction:column;
      gap:8px;
      /* 半透明 + 高斯模糊 */
      background: rgba(0,0,0,0.28);
      color: #fff;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-left: 1px solid rgba(255,255,255,0.04);
      transition: transform 260ms ease, opacity 260ms ease;
      transform: translateX(8px);
      opacity: 0;
      pointer-events: none; /* 默认不可交互，visible 时开启 */
    }

    .playlist-panel.visible {
      transform: translateX(0);
      opacity: 1;
      pointer-events: auto;
    }

    .playlist-header {
      font-size:14px;
      font-weight:600;
      padding-bottom:6px;
      border-bottom:1px solid rgba(255,255,255,0.06);
    }

    .video-list {
      overflow:auto;
      padding-top:8px;
      flex:1;
    }

    .video-item {
      padding:10px 8px;
      border-radius:6px;
      margin-bottom:6px;
      cursor:pointer;
      color:#fff;
      background: transparent;
      transition: background 160ms ease, transform 120ms ease;
      display:flex;
      align-items:center;
      gap:8px;
      font-size:14px;
      line-height:1.2;
    }

    .video-item:hover {
      background: rgba(255,255,255,0.04);
      transform: translateX(4px);
    }

    .video-item.active {
      background: linear-gradient(90deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      font-weight:700;
    }

    .current-title {
      margin-top:10px;
      font-size:15px;
      color:#fff;
      opacity:0.95;
    }

    .empty {
      padding:14px;
      color:rgba(255,255,255,0.7);
      text-align:center;
    }

    /* 小屏适配：当宽度不足时，列表叠加在播放器上方（右下角可关闭） */
    @media (max-width:900px) {
      #dplayer-container { width:100%; height:56vh; }
      .playlist-panel {
        position:absolute;
        right:12px;
        top:12px;
        width:86%;
        max-width:360px;
        transform: translateY(-8px);
        opacity:0;
      }
      .playlist-panel.visible { transform: translateY(0); opacity:1; }
    }

    /* 隐藏外部滚动条样式优化 */
    .video-list::-webkit-scrollbar { width:8px; height:8px; }
    .video-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius:6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="player-shell" id="playerShell">
      <div id="dplayer-container"></div>

      <div class="playlist-panel" id="playlistPanel" aria-hidden="true">
        <div class="playlist-header">视频列表</div>
        <div class="video-list" id="videoList">
          <div class="empty">正在加载视频列表…</div>
        </div>
        <div class="current-title" id="currentTitle">当前视频：无</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>

  <script>
    const params = new URLSearchParams(location.search);
    const playlistName = params.get('playlist') || '';

    // DPlayer 初始化
    const dp = new DPlayer({
      container: document.getElementById('dplayer-container'),
      video: { url: '' },
      autoplay: false,
      theme: '#1e90ff',
      lang: 'zh-cn'
    });

    let videos = [];
    let currentIndex = -1;
    window._currentHls = null;

    // DOM
    const playlistPanel = document.getElementById('playlistPanel');
    const videoListEl = document.getElementById('videoList');
    const currentTitleEl = document.getElementById('currentTitle');
    const playerShell = document.getElementById('playerShell');

    // 显示/隐藏逻辑：与下方进度条一致
    // 规则：当鼠标进入 DPlayer 控制区或进度条时显示侧栏；离开后延迟隐藏
    let hideTimer = null;
    const HIDE_DELAY = 1200; // 毫秒

    function showPlaylist() {
      if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
      playlistPanel.classList.add('visible');
      playlistPanel.setAttribute('aria-hidden', 'false');
    }

    function scheduleHidePlaylist() {
      if (hideTimer) clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        playlistPanel.classList.remove('visible');
        playlistPanel.setAttribute('aria-hidden', 'true');
      }, HIDE_DELAY);
    }

    // 绑定到 DPlayer 控制区与进度条
    function attachControlHoverLogic() {
      // DPlayer 控制器选择器（兼容不同版本）
      const controller = dp.container.querySelector('.dplayer-controller') || dp.container.querySelector('.dplayer-bar-wrap') || dp.container;
      const progress = dp.container.querySelector('.dplayer-bar-wrap') || dp.container.querySelector('.dplayer-bar');

      // 鼠标进入控制区或进度条显示
      if (controller) {
        controller.addEventListener('mouseenter', showPlaylist);
        controller.addEventListener('mousemove', showPlaylist);
        controller.addEventListener('mouseleave', scheduleHidePlaylist);
      }

      if (progress) {
        progress.addEventListener('mouseenter', showPlaylist);
        progress.addEventListener('mousemove', showPlaylist);
        progress.addEventListener('mouseleave', scheduleHidePlaylist);
        // 点击进度条也显示（用户交互）
        progress.addEventListener('click', showPlaylist);
      }

      // 当鼠标进入整个播放器区域也显示（便于触发）
      playerShell.addEventListener('mouseenter', () => {
        // 仅在控制区不可见时不自动显示，避免总是遮挡
        // 这里我们选择：进入播放器区域时不强制显示，除非是控制区或进度条
      });

      // 当视频暂停或结束时短暂显示侧栏
      dp.on && dp.on('pause', () => { showPlaylist(); scheduleHidePlaylist(); });
      dp.on && dp.on('ended', () => { showPlaylist(); scheduleHidePlaylist(); });
    }

    // 请求 JSON 辅助
    async function fetchJson(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    // 解析并获取可播放 URL（对象键或完整 URL）
    async function resolvePlayableUrl(fileOrUrl) {
      if (!fileOrUrl) return null;
      if (/^https?:\/\//i.test(fileOrUrl)) return fileOrUrl;
      const res = await fetch(`/api/video-url?file=${encodeURIComponent(fileOrUrl)}`);
      if (!res.ok) throw new Error('获取签名 URL 失败');
      const json = await res.json();
      return json.url;
    }

    // 渲染列表项
    function createVideoItemEl(name, idx) {
      const el = document.createElement('div');
      el.className = 'video-item';
      el.dataset.index = idx;
      el.textContent = name || ('视频 ' + (idx + 1));
      el.addEventListener('click', () => playVideoByIndex(idx));
      return el;
    }

    // 加载播放列表（必须带 playlist 参数）
    async function loadVideosForPlaylist(playlist) {
      try {
        if (!playlist) {
          videoListEl.innerHTML = '<div class="empty">未指定播放列表</div>';
          currentTitleEl.textContent = '当前视频：无';
          return;
        }
        const url = `/api/videos?playlist=${encodeURIComponent(playlist)}`;
        const data = await fetchJson(url);
        videos = data.videos || [];
        videoListEl.innerHTML = '';
        if (!videos.length) {
          videoListEl.innerHTML = '<div class="empty">该播放列表没有视频</div>';
          currentTitleEl.textContent = '当前视频：无';
          return;
        }
        videos.forEach((v, i) => {
          const el = createVideoItemEl(v.name || v.file || ('视频 ' + (i+1)), i);
          videoListEl.appendChild(el);
        });

        // 自动播放第一个
        playVideoByIndex(0);
      } catch (err) {
        console.error(err);
        videoListEl.innerHTML = '<div class="empty">加载视频失败</div>';
        currentTitleEl.textContent = '当前视频：无';
      }
    }

    // 播放指定索引
    async function playVideoByIndex(idx) {
      if (idx === currentIndex) return;
      currentIndex = idx;

      // 高亮
      document.querySelectorAll('.video-item').forEach(el => el.classList.remove('active'));
      const activeEl = document.querySelector(`.video-item[data-index="${idx}"]`);
      if (activeEl) activeEl.classList.add('active');

      const file = videos[idx].file;
      let playable;
      try {
        playable = await resolvePlayableUrl(file);
      } catch (e) {
        console.error(e);
        alert('获取播放地址失败');
        return;
      }
      if (!playable) { alert('播放地址为空'); return; }

      // 更新当前标题
      const titleText = videos[idx].name || file || ('视频 ' + (idx+1));
      currentTitleEl.textContent = '当前视频：' + titleText;

      // 切换 DPlayer 源
      try {
        dp.switchVideo({ url: playable, type: 'auto' });
      } catch (e) {
        const videoEl = dp.video && dp.video.video;
        if (videoEl) {
          videoEl.src = playable;
          videoEl.load();
          videoEl.play().catch(()=>{});
        }
      }

      // HLS 处理
      if (playable.endsWith('.m3u8') && window.Hls && Hls.isSupported()) {
        if (window._currentHls) { try { window._currentHls.destroy(); } catch(e){} window._currentHls = null; }
        const videoEl = dp.video && dp.video.video;
        if (videoEl) {
          window._currentHls = new Hls();
          window._currentHls.loadSource(playable);
          window._currentHls.attachMedia(videoEl);
        }
      } else {
        if (window._currentHls) { try { window._currentHls.destroy(); } catch(e){} window._currentHls = null; }
      }
    }

    // 初始化
    (async () => {
      attachControlHoverLogic();
      await loadVideosForPlaylist(playlistName);

      // 当视频结束自动播放下一个
      dp.on && dp.on('ended', () => {
        const next = currentIndex + 1;
        if (next < videos.length) playVideoByIndex(next);
      });

      // 额外：当用户点击播放器空白区域时短暂显示侧栏
      dp.container.addEventListener('click', (e) => {
        // 如果点击的是控制区或进度条，已由其他事件处理
        showPlaylist();
        scheduleHidePlaylist();
      });
    })();
  </script>
</body>
</html>
