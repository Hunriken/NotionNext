<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>播放器 - 单列表</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css" />
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f7f8fb;color:#111}
    .container{max-width:1100px;margin:20px auto;padding:12px}
    .player-wrap{background:#000;padding:8px;border-radius:6px}
    #dplayer-container{width:100%;height:560px;max-height:70vh}
    .video-list{margin-top:12px;background:#fff;border-radius:6px;padding:8px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
    .video-item{padding:10px;border-bottom:1px solid #eee;cursor:pointer}
    .video-item:last-child{border-bottom:0}
    .video-item:hover{background:#f0f8ff}
    .video-item.active{background:#e6f3ff;font-weight:600}
    .current-title{margin-top:8px;font-size:16px;color:#222}
    .empty{padding:16px;color:#666;text-align:center}
  </style>
</head>
<body>
  <div class="container">
    <div class="player-wrap">
      <div id="dplayer-container"></div>
    </div>

    <div class="current-title" id="currentTitle">当前视频：无</div>

    <div class="video-list" id="videoList">
      <div class="empty">正在加载视频列表…</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>

  <script>
    // 解析 query 参数
    const params = new URLSearchParams(location.search);
    const playlistName = params.get('playlist') || '';

    // 初始化 DPlayer（占位）
    const dp = new DPlayer({
      container: document.getElementById('dplayer-container'),
      video: { url: '' },
      autoplay: false
    });

    let videos = [];
    let currentIndex = -1;
    window._currentHls = null;

    // 使用全局 fetch 调用后端
    async function fetchJson(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    // 解析数据库字段：如果是完整 URL 直接返回，否则请求签名
    async function resolvePlayableUrl(fileOrUrl) {
      if (!fileOrUrl) return null;
      if (/^https?:\/\//i.test(fileOrUrl)) return fileOrUrl;
      const res = await fetch(`/api/video-url?file=${encodeURIComponent(fileOrUrl)}`);
      if (!res.ok) throw new Error('获取签名 URL 失败');
      const json = await res.json();
      return json.url;
    }

    function createVideoItemEl(name, idx) {
      const el = document.createElement('div');
      el.className = 'video-item';
      el.dataset.index = idx;
      el.textContent = name || ('视频 ' + (idx + 1));
      el.addEventListener('click', () => playVideoByIndex(idx));
      return el;
    }

    async function loadVideosForPlaylist(playlist) {
      try {
        const url = playlist ? `/api/videos?playlist=${encodeURIComponent(playlist)}` : '/api/videos';
        const data = await fetchJson(url);
        videos = data.videos || [];
        const list = document.getElementById('videoList');
        list.innerHTML = '';
        if (!videos.length) {
          list.innerHTML = '<div class="empty">该播放列表没有视频</div>';
          document.getElementById('currentTitle').textContent = '当前视频：无';
          return;
        }
        videos.forEach((v, i) => {
          const el = createVideoItemEl(v.name || v.file || ('视频 ' + (i+1)), i);
          list.appendChild(el);
        });

        // 自动播放第一个视频
        playVideoByIndex(0);
      } catch (err) {
        console.error(err);
        document.getElementById('videoList').innerHTML = '<div class="empty">加载视频失败</div>';
        document.getElementById('currentTitle').textContent = '当前视频：无';
      }
    }

    async function playVideoByIndex(idx) {
      if (idx === currentIndex) return;
      currentIndex = idx;

      // 高亮
      document.querySelectorAll('.video-item').forEach(el => el.classList.remove('active'));
      const activeEl = document.querySelector(`.video-item[data-index="${idx}"]`);
      if (activeEl) activeEl.classList.add('active');

      const file = videos[idx].file;
      let playable;
      try {
        playable = await resolvePlayableUrl(file);
      } catch (e) {
        console.error(e);
        alert('获取播放地址失败');
        return;
      }
      if (!playable) { alert('播放地址为空'); return; }

      // 更新当前标题
      const titleText = videos[idx].name || file || ('视频 ' + (idx+1));
      document.getElementById('currentTitle').textContent = '当前视频：' + titleText;

      // 切换 DPlayer 源
      try {
        dp.switchVideo({ url: playable, type: 'auto' });
      } catch (e) {
        // 兜底：直接替换 video 元素 src
        const videoEl = dp.video && dp.video.video;
        if (videoEl) {
          videoEl.src = playable;
          videoEl.load();
          videoEl.play().catch(()=>{});
        }
      }

      // HLS 处理（如果是 .m3u8）
      if (playable.endsWith('.m3u8') && window.Hls && Hls.isSupported()) {
        if (window._currentHls) { try { window._currentHls.destroy(); } catch(e){} window._currentHls = null; }
        const videoEl = dp.video && dp.video.video;
        if (videoEl) {
          window._currentHls = new Hls();
          window._currentHls.loadSource(playable);
          window._currentHls.attachMedia(videoEl);
        }
      } else {
        if (window._currentHls) { try { window._currentHls.destroy(); } catch(e){} window._currentHls = null; }
      }
    }

    // 初始化加载
    (async () => {
      await loadVideosForPlaylist(playlistName);
      // 当视频结束自动播放下一个（同列表内）
      dp.on('ended', () => {
        const next = currentIndex + 1;
        if (next < videos.length) playVideoByIndex(next);
      });
    })();
  </script>
</body>
</html>
