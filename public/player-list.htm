<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>播放器 - 单列表（节约资源 + 下一曲按钮）</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css" />
  <style>
    html,body{height:100%;margin:0;background:transparent;font-family:Arial,Helvetica,sans-serif;color:#fff}
    .wrap{width:100%;max-width:1200px;margin:0 auto;padding:12px;box-sizing:border-box}
    .player-shell{position:relative;background:#000;border-radius:8px;overflow:hidden}
    /* DPlayer 占满宽度，进度条填满整个宽度 */
    #dplayer-container{width:100%;height:64vh;min-height:360px;background:#000;position:relative;z-index:1}

    /* 侧边播放列表：绝对定位覆盖在播放器右侧，不占用 dplayer 宽度 */
    .playlist-panel{
      position:absolute;
      right:0;
      width:224px; /* 宽度减少约 30% */
      top:10%; /* 上下内缩 10% */
      bottom:10%;
      box-sizing:border-box;
      padding:12px 10px;
      display:flex;
      flex-direction:column;
      gap:8px;
      background: rgba(0,0,0,0.28);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color:#fff;
      border-left:1px solid rgba(255,255,255,0.04);
      transform: translateX(100%);
      opacity:0;
      pointer-events:none;
      transition: transform 320ms cubic-bezier(.2,.9,.2,1), opacity 260ms ease;
      z-index: 5;
    }
    .playlist-panel.visible{ transform: translateX(0); opacity:1; pointer-events:auto; }

    .playlist-header{font-size:14px;font-weight:600;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.06)}
    .video-list{overflow:auto;padding-top:6px;flex:1}
    .video-item{
      padding:10px 8px;border-radius:6px;margin-bottom:8px;cursor:pointer;color:#fff;background:transparent;
      transition: background 160ms ease, transform 120ms ease;
      display:flex;align-items:center;gap:8px;font-size:14px;line-height:1.2;
    }
    .video-item:hover{background: rgba(255,255,255,0.04);transform: translateX(4px)}
    /* 激活项：标题为黑色，背景变浅；去掉“当前视频”显示 */
    .video-item.active{
      background: rgba(255,255,255,0.92);
      color: #000;
      font-weight:700;
    }
    .video-item .title{color:inherit;flex:1}
    .empty{padding:14px;color:rgba(255,255,255,0.7);text-align:center}

    /* 小屏适配 */
    @media (max-width:900px){
      #dplayer-container{height:56vh}
      .playlist-panel{width:86%;max-width:360px;right:12px;top:8%;bottom:8%}
    }

    .video-list::-webkit-scrollbar{width:8px}
    .video-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:6px}

    /* 自定义 next 按钮样式（与 DPlayer 控件风格一致） */
    .dplayer-next-btn {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:36px;
      height:36px;
      margin-left:8px;
      border-radius:4px;
      background: rgba(0,0,0,0.35);
      color:#fff;
      cursor:pointer;
      transition: background 160ms ease, transform 120ms ease;
      border: none;
      outline: none;
    }
    .dplayer-next-btn:hover { background: rgba(255,255,255,0.06); transform: translateY(-1px); }
    .dplayer-next-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
    /* 图标（简单三角与竖线） */
    .dplayer-next-btn svg { width:18px; height:18px; fill:currentColor; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="player-shell" id="playerShell">
      <div id="dplayer-container"></div>

      <div class="playlist-panel" id="playlistPanel" aria-hidden="true">
        <div class="playlist-header">视频列表</div>
        <div class="video-list" id="videoList"><div class="empty">正在加载视频列表…</div></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>

  <script>
    const params = new URLSearchParams(location.search);
    const playlistName = params.get('playlist') || '';

    // DPlayer 初始化（初始不加载任何视频 URL，除非第一个）
    const dp = new DPlayer({
      container: document.getElementById('dplayer-container'),
      video: { url: '' },
      autoplay: false,
      theme: '#1e90ff',
      lang: 'zh-cn'
    });

    let videos = [];
    let currentIndex = -1;
    window._currentHls = null;

    const playlistPanel = document.getElementById('playlistPanel');
    const videoListEl = document.getElementById('videoList');
    const dplayerContainer = document.getElementById('dplayer-container');

    // 显示/隐藏控制（与之前逻辑一致）
    let hideTimer = null;
    const IDLE_HIDE_MS = 1000;
    let lastHiddenByIdle = false;

    function showPlaylist() {
      if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
      lastHiddenByIdle = false;
      playlistPanel.classList.add('visible');
      playlistPanel.setAttribute('aria-hidden', 'false');
    }

    function hidePlaylistImmediate(byIdle = false) {
      if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
      playlistPanel.classList.remove('visible');
      playlistPanel.setAttribute('aria-hidden', 'true');
      if (byIdle) lastHiddenByIdle = true;
    }

    function scheduleHideAfterIdle() {
      if (hideTimer) clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        if (!isPointerOverElement(playlistPanel)) {
          hidePlaylistImmediate(true);
        }
      }, IDLE_HIDE_MS);
    }

    function isPointerOverElement(el) {
      return el.matches(':hover');
    }

    function getProgressElement() {
      return dp.container.querySelector('.dplayer-bar-wrap') || dp.container.querySelector('.dplayer-bar') || null;
    }
    const progressEl = getProgressElement();

    // 列表 hover 行为
    playlistPanel.addEventListener('mouseenter', () => { showPlaylist(); });
    playlistPanel.addEventListener('mouseleave', () => { hidePlaylistImmediate(false); });

    // 视频区域 hover 行为（含右侧 10% 再次唤起逻辑）
    let videoIdleTimer = null;
    function isEventOverElement(event, el) {
      if (!el) return false;
      const rect = el.getBoundingClientRect();
      return event.clientX >= rect.left && event.clientX <= rect.right && event.clientY >= rect.top && event.clientY <= rect.bottom;
    }

    function onVideoMouseEnter(e) {
      if (isEventOverElement(e, progressEl)) return;
      showPlaylist();
      if (videoIdleTimer) clearTimeout(videoIdleTimer);
      videoIdleTimer = setTimeout(() => {
        if (!isPointerOverElement(playlistPanel) && isPointerOverElement(dplayerContainer)) {
          hidePlaylistImmediate(true);
        }
      }, IDLE_HIDE_MS);
    }

    function onVideoMouseMove(e) {
      if (isEventOverElement(e, progressEl)) return;

      const rect = dplayerContainer.getBoundingClientRect();
      const relX = e.clientX - rect.left;
      const width = rect.width || 1;
      const right10 = width * 0.9;

      // 如果之前是因静止隐藏，并且当前在右侧 10% 区域，则再次显示
      if (lastHiddenByIdle && relX >= right10 && !isPointerOverElement(playlistPanel)) {
        showPlaylist();
        lastHiddenByIdle = false;
      }

      if (videoIdleTimer) clearTimeout(videoIdleTimer);
      videoIdleTimer = setTimeout(() => {
        if (!isPointerOverElement(playlistPanel) && isPointerOverElement(dplayerContainer)) {
          hidePlaylistImmediate(true);
        }
      }, IDLE_HIDE_MS);
    }

    function onVideoMouseLeave() {
      if (videoIdleTimer) { clearTimeout(videoIdleTimer); videoIdleTimer = null; }
      hidePlaylistImmediate(false);
      lastHiddenByIdle = false;
    }

    dplayerContainer.addEventListener('mouseenter', onVideoMouseEnter);
    dplayerContainer.addEventListener('mousemove', onVideoMouseMove);
    dplayerContainer.addEventListener('mouseleave', onVideoMouseLeave);

    // 点击播放器空白区域短暂显示（不在进度条上）
    dplayerContainer.addEventListener('click', (e) => {
      if (isEventOverElement(e, progressEl)) return;
      showPlaylist();
      scheduleHideAfterIdle();
    });

    // 仅为第一个视频在加载时请求签名并设置播放器，其余视频点击时再请求签名
    // resolvePlayableUrl 只在需要播放时调用
    async function fetchJson(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function resolvePlayableUrl(fileOrUrl) {
      if (!fileOrUrl) return null;
      if (/^https?:\/\//i.test(fileOrUrl)) return fileOrUrl;
      const res = await fetch(`/api/video-url?file=${encodeURIComponent(fileOrUrl)}`);
      if (!res.ok) throw new Error('获取签名 URL 失败');
      const json = await res.json();
      return json.url;
    }

    // 列表项：移除按钮，仅点击条目播放
    function createVideoItemEl(name, idx) {
      const el = document.createElement('div');
      el.className = 'video-item';
      el.dataset.index = idx;

      const title = document.createElement('div');
      title.className = 'title';
      title.textContent = name || ('视频 ' + (idx + 1));
      el.appendChild(title);

      el.addEventListener('click', () => playVideoByIndex(idx));
      return el;
    }

    // 加载播放列表（不预加载除第一个外的视频）
    async function loadVideosForPlaylist(playlist) {
      try {
        if (!playlist) {
          videoListEl.innerHTML = '<div class="empty">未指定播放列表</div>';
          return;
        }
        const url = `/api/videos?playlist=${encodeURIComponent(playlist)}`;
        const data = await fetchJson(url);
        videos = data.videos || [];
        videoListEl.innerHTML = '';
        if (!videos.length) {
          videoListEl.innerHTML = '<div class="empty">该播放列表没有视频</div>';
          return;
        }
        videos.forEach((v, i) => {
          const el = createVideoItemEl(v.name || v.file || ('视频 ' + (i+1)), i);
          videoListEl.appendChild(el);
        });

        // 只为第一个视频请求签名并加载到播放器（节约资源）
        await loadAndPlayFirstIfNeeded();
      } catch (err) {
        console.error(err);
        videoListEl.innerHTML = '<div class="empty">加载视频失败</div>';
      }
    }

    // 仅加载并播放第一个视频（如果存在）
    async function loadAndPlayFirstIfNeeded() {
      if (!videos || videos.length === 0) return;
      // 播放第一个（会请求签名）
      await playVideoByIndex(0, { preloadOnly: false });
      // 更新 next 按钮状态
      updateNextButtonState();
    }

    // 播放指定索引；选项：preloadOnly（若 true 则只预加载，不自动 play）——我们不需要预fetch其他视频
    async function playVideoByIndex(idx, opts = { preloadOnly: false }) {
      if (idx === currentIndex && !opts.preloadOnly) return;
      currentIndex = idx;

      document.querySelectorAll('.video-item').forEach(el => el.classList.remove('active'));
      const activeEl = document.querySelector(`.video-item[data-index="${idx}"]`);
      if (activeEl) activeEl.classList.add('active');

      const file = videos[idx].file;
      let playable;
      try {
        // 只有在需要播放时才请求签名（节约资源）
        playable = await resolvePlayableUrl(file);
      } catch (e) {
        console.error(e);
        alert('获取播放地址失败');
        return;
      }
      if (!playable) { alert('播放地址为空'); return; }

      // 切换 DPlayer 源并播放（或仅设置源）
      try {
        dp.switchVideo({ url: playable, type: 'auto' });
        if (!opts.preloadOnly) {
          // 尝试自动播放
          const videoEl = dp.video && dp.video.video;
          if (videoEl) videoEl.play().catch(()=>{});
        }
      } catch (e) {
        const videoEl = dp.video && dp.video.video;
        if (videoEl) {
          videoEl.src = playable;
          videoEl.load();
          if (!opts.preloadOnly) videoEl.play().catch(()=>{});
        }
      }

      // HLS 处理（仅在播放时）
      if (playable.endsWith('.m3u8') && window.Hls && Hls.isSupported()) {
        if (window._currentHls) { try { window._currentHls.destroy(); } catch(e){} window._currentHls = null; }
        const videoEl = dp.video && dp.video.video;
        if (videoEl) {
          window._currentHls = new Hls();
          window._currentHls.loadSource(playable);
          window._currentHls.attachMedia(videoEl);
        }
      } else {
        if (window._currentHls) { try { window._currentHls.destroy(); } catch(e){} window._currentHls = null; }
      }

      updateNextButtonState();
    }

    // 添加“下一个”按钮到 DPlayer 控制条（放在播放按钮右侧）
    function injectNextButton() {
      // 等待控制条渲染
      const tryFind = () => {
        const controller = dp.container.querySelector('.dplayer-controller') || dp.container;
        if (!controller) return false;

        // 找到播放按钮容器（.dplayer-play）
        const playWrap = controller.querySelector('.dplayer-play') || controller.querySelector('.dplayer-icon');
        // 如果找不到，尝试在 controller 的子元素中查找播放图标
        const target = playWrap || controller.querySelector('.dplayer-play-icon') || controller;
        if (!target) return false;

        // 创建 next 按钮
        if (controller.querySelector('.dplayer-next-btn')) return true; // 已注入

        const nextBtn = document.createElement('button');
        nextBtn.className = 'dplayer-next-btn';
        nextBtn.title = '下一曲';

        // SVG 图标：双三角 + 竖线（常见“下一曲”图标）
        nextBtn.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6 6v12l8.5-6L6 6zM16 6h2v12h-2z"/></svg>';

        // 插入到播放按钮右侧（如果 playWrap 存在则插入其后）
        if (playWrap && playWrap.parentNode) {
          playWrap.parentNode.insertBefore(nextBtn, playWrap.nextSibling);
        } else {
          controller.appendChild(nextBtn);
        }

        // 点击事件：播放下一条
        nextBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          playNext();
        });

        // 存储引用以便更新状态
        dp._nextBtn = nextBtn;
        updateNextButtonState();
        return true;
      };

      // 尝试多次直到找到控制条
      let attempts = 0;
      const interval = setInterval(() => {
        attempts++;
        if (tryFind() || attempts > 20) clearInterval(interval);
      }, 200);
    }

    function updateNextButtonState() {
      const btn = dp._nextBtn;
      if (!btn) return;
      if (!videos || videos.length === 0) {
        btn.disabled = true;
        return;
      }
      btn.disabled = (currentIndex >= videos.length - 1);
    }

    function playNext() {
      if (!videos || videos.length === 0) return;
      const next = currentIndex + 1;
      if (next < videos.length) playVideoByIndex(next);
    }

    // 初始化加载
    (async () => {
      injectNextButton();
      await loadVideosForPlaylist(playlistName);

      dp.on && dp.on('ended', () => {
        const next = currentIndex + 1;
        if (next < videos.length) playVideoByIndex(next);
      });

      // 当用户切换视频（通过点击列表或 next），确保 next 按钮状态更新
      // 也在 playVideoByIndex 内更新
    })();
  </script>
</body>
</html>
