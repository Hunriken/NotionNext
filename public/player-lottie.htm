<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
    }

    #container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    #lottie {
      width: 100%;
      height: 100%;
      background: transparent;
    }

    #controls {
      position: absolute;
      bottom: 12px;
      left: 12px;
      right: 12px;
      height: 42px;

      display: flex;
      align-items: center;
      gap: 10px;

      padding: 8px 12px;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
      border-radius: 8px;

      z-index: 10;

      opacity: 1;
      transition: opacity 0.4s ease;
    }

    #controls.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #progress {
      flex: 1;
    }

    button {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      background: rgba(255,255,255,0.85);
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="container">
    <div id="lottie"></div>

    <div id="controls">
      <button id="toggle">暂停</button>
      <input id="progress" type="range" min="0" max="100" value="0">
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search)
    let file = params.get('file')

    const R2 = 'https://assets.haoping.me'
    if (file && !file.startsWith('http')) {
      file = `${R2}/${file}`
    }

    const anim = lottie.loadAnimation({
      container: document.getElementById('lottie'),
      renderer: 'svg',
      loop: true,
      autoplay: true,
      path: file
    })

    /* -------------------------
       透明背景：三重清除机制
    -------------------------- */
    anim.addEventListener('DOMLoaded', () => {
      const svg = document.querySelector('#lottie svg')
      if (svg) {
        svg.style.background = 'transparent'
        svg.setAttribute('preserveAspectRatio', 'xMidYMid meet')
      }

      // 清除所有 rect 的白色背景
      document.querySelectorAll('#lottie svg rect').forEach(r => {
        r.setAttribute('fill', 'transparent')
        r.style.fill = 'transparent'
      })

      // 清除所有 g 的背景
      document.querySelectorAll('#lottie svg g').forEach(g => {
        g.style.background = 'transparent'
      })
    })

    /* -------------------------
       暂停 / 播放
    -------------------------- */
    let playing = true
    const toggle = document.getElementById('toggle')
    toggle.onclick = () => {
      if (playing) {
        anim.pause()
        toggle.innerText = '播放'
      } else {
        anim.play()
        toggle.innerText = '暂停'
      }
      playing = !playing
    }

    /* -------------------------
       进度条
    -------------------------- */
    const progress = document.getElementById('progress')

    anim.addEventListener('enterFrame', () => {
      const percent = (anim.currentFrame / anim.totalFrames) * 100
      progress.value = percent
    })

    progress.oninput = () => {
      const frame = (progress.value / 100) * anim.totalFrames
      anim.goToAndStop(frame, true)
      playing = false
      toggle.innerText = '播放'
    }

    /* -------------------------
       自动隐藏控制条
    -------------------------- */
    const controls = document.getElementById('controls')
    let hideTimer = null

    function showControls() {
      controls.classList.remove('hidden')
      if (hideTimer) clearTimeout(hideTimer)
      hideTimer = setTimeout(() => {
        controls.classList.add('hidden')
      }, 800)
    }

    document.addEventListener('mousemove', showControls)
    showControls()

    /* -------------------------
       自动暂停不可见动画
    -------------------------- */
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          anim.play()
          toggle.innerText = '暂停'
          playing = true
        } else {
          anim.pause()
          toggle.innerText = '播放'
          playing = false
        }
      })
    })

    observer.observe(document.getElementById('container'))
  </script>
</body>
</html>
