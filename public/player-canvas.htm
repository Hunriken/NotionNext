<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- 使用 5.12.2（Canvas 更稳定） -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
    }

    /* 关键：给容器一个明确的可视尺寸 */
    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
      cursor: pointer; /* 点击播放/暂停 */
    }

    #lottie {
      width: 100%;
      height: 100%;
      background: transparent;
    }

    /* 关键：强制 Canvas 撑满容器 */
    #lottie canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    #controls {
      position: absolute;
      bottom: 12px;
      left: 12px;
      right: 12px;
      height: 42px;

      display: flex;
      align-items: center;
      gap: 10px;

      padding: 8px 12px;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
      border-radius: 8px;

      z-index: 10;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    #controls.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #progress {
      flex: 1;
    }

    button {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      background: rgba(255,255,255,0.85);
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="container">
    <div id="lottie"></div>

    <div id="controls">
      <button id="toggle">暂停</button>
      <input id="progress" type="range" min="0" max="100" value="0">
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    let file = params.get('file');

    /* 背景颜色增强：支持 HEX / RGB / RGBA / HSL / 名称 */
    let bg = params.get('bg');

    if (bg) {
      bg = decodeURIComponent(bg);

      if (/^[0-9a-fA-F]{3}$/.test(bg)) bg = "#" + bg;
      if (/^[0-9a-fA-F]{6}$/.test(bg)) bg = "#" + bg;

      document.documentElement.style.background = bg;
      document.body.style.background = bg;
      document.getElementById('container').style.background = bg;
      document.getElementById('lottie').style.background = bg;
    }

    const R2 = 'https://assets.haoping.me';
    if (file && !file.startsWith('http')) {
      file = `${R2}/${file}`;
    }

    const anim = lottie.loadAnimation({
      container: document.getElementById('lottie'),
      renderer: 'canvas',          // ✅ 改成 canvas
      loop: true,
      autoplay: true,
      path: file,
      rendererSettings: {
        clearCanvas: true,
        preserveAspectRatio: 'xMidYMid meet'
      }
    });

    /* Canvas 模式下不再操作 SVG DOM，直接删掉 DOMLoaded 那段 */

    /* 暂停 / 播放 */
    let playing = true;
    const toggle = document.getElementById('toggle');

    function togglePlay() {
      if (playing) {
        anim.pause();
        toggle.innerText = '播放';
      } else {
        anim.play();
        toggle.innerText = '暂停';
      }
      playing = !playing;
    }

    toggle.onclick = togglePlay;

    /* 点击任意位置切换播放 / 暂停 */
    document.getElementById('container').addEventListener('click', (e) => {
      if (e.target.closest('#controls')) return;
      togglePlay();
    });

    /* 进度条 */
    const progress = document.getElementById('progress');

    anim.addEventListener('enterFrame', () => {
      if (!anim.totalFrames) return;
      const percent = (anim.currentFrame / anim.totalFrames) * 100;
      progress.value = percent;
    });

    progress.oninput = () => {
      if (!anim.totalFrames) return;
      const frame = (progress.value / 100) * anim.totalFrames;
      anim.goToAndStop(frame, true);
      playing = false;
      toggle.innerText = '播放';
    };

    /* 自动隐藏控制条 */
    const controls = document.getElementById('controls');
    let hideTimer = null;

    function showControls() {
      controls.classList.remove('hidden');
      if (hideTimer) clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        controls.classList.add('hidden');
      }, 1000);
    }

    document.addEventListener('mousemove', showControls);
    showControls();

    /* 自动暂停不可见动画 */
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          anim.play();
          toggle.innerText = '暂停';
          playing = true;
        } else {
          anim.pause();
          toggle.innerText = '播放';
          playing = false;
        }
      });
    });

    observer.observe(document.getElementById('container'));
  </script>
</body>
</html>
