<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
    }

    #container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: pointer;
    }

    #lottie {
      width: 100%;
      height: 100%;
      background: transparent;
    }

    /* Canvas 必须强制撑满容器 */
    #lottie canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    #controls {
      position: absolute;
      bottom: 12px;
      left: 12px;
      right: 12px;
      height: 42px;

      display: flex;
      align-items: center;
      gap: 10px;

      padding: 8px 12px;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
      border-radius: 8px;

      z-index: 10;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    #controls.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #progress {
      flex: 1;
    }

    button {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      background: rgba(255,255,255,0.85);
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="container">
    <div id="lottie"></div>

    <div id="controls">
      <button id="toggle">暂停</button>
      <input id="progress" type="range" min="0" max="100" value="0">
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    let file = params.get("file");

    /* 背景色增强 */
    let bg = params.get("bg");
    if (bg) {
      bg = decodeURIComponent(bg);
      if (/^[0-9a-fA-F]{3}$/.test(bg)) bg = "#" + bg;
      if (/^[0-9a-fA-F]{6}$/.test(bg)) bg = "#" + bg;

      document.documentElement.style.background = bg;
      document.body.style.background = bg;
      document.getElementById("container").style.background = bg;
      document.getElementById("lottie").style.background = bg;
    }

    /* 自动补全资源路径 */
    const R2 = "https://assets.haoping.me";
    if (file && !file.startsWith("http")) {
      file = `${R2}/${file}`;
    }

    /* 手动加载 JSON 并修复 images 路径 */
    async function loadJSON(url) {
      const res = await fetch(url);
      const json = await res.json();

      const base = url.substring(0, url.lastIndexOf("/") + 1);

      if (json.assets) {
        json.assets.forEach(a => {
          if (a.u && a.p) {
            a.u = base + a.u; // 修复 images/ 路径
          }
        });
      }

      return json;
    }

    let anim;

    loadJSON(file).then(json => {
      anim = lottie.loadAnimation({
        container: document.getElementById("lottie"),
        renderer: "canvas",
        loop: true,
        autoplay: true,
        animationData: json,
        rendererSettings: {
          clearCanvas: true,
          preserveAspectRatio: "xMidYMid meet"
        }
      });

      setupControls(anim);
    });

    /* 控制条逻辑 */
    function setupControls(anim) {
      let playing = true;
      const toggle = document.getElementById("toggle");
      const progress = document.getElementById("progress");

      function togglePlay() {
        if (playing) {
          anim.pause();
          toggle.innerText = "播放";
        } else {
          anim.play();
          toggle.innerText = "暂停";
        }
        playing = !playing;
      }

      toggle.onclick = togglePlay;

      document.getElementById("container").addEventListener("click", e => {
        if (e.target.closest("#controls")) return;
        togglePlay();
      });

      anim.addEventListener("enterFrame", () => {
        const percent = (anim.currentFrame / anim.totalFrames) * 100;
        progress.value = percent;
      });

      progress.oninput = () => {
        const frame = (progress.value / 100) * anim.totalFrames;
        anim.goToAndStop(frame, true);
        playing = false;
        toggle.innerText = "播放";
      };

      const controls = document.getElementById("controls");
      let hideTimer = null;

      function showControls() {
        controls.classList.remove("hidden");
        if (hideTimer) clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
          controls.classList.add("hidden");
        }, 1000);
      }

      document.addEventListener("mousemove", showControls);
      showControls();

      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            anim.play();
            toggle.innerText = "暂停";
            playing = true;
          } else {
            anim.pause();
            toggle.innerText = "播放";
            playing = false;
          }
        });
      });

      observer.observe(document.getElementById("container"));
    }
  </script>
</body>
</html>
