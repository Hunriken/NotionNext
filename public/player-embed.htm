<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Lottie Demo Wrapper Player</title>
<style>
  html,body{height:100%;margin:0;background:#111;color:#fff;font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;}
  .wrap{height:100vh;display:flex;flex-direction:column;}
  .top{padding:8px 12px;background:#0b0b0b;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;gap:8px;align-items:center;}
  .controls{display:flex;gap:8px;align-items:center;flex:1;}
  button{padding:6px 10px;border-radius:6px;border:none;background:#fff;color:#000;cursor:pointer;}
  input[type=range]{width:320px;}
  .stage{flex:1;position:relative;background:#000;}
  iframe{width:100%;height:100%;border:0;background:transparent;}
  .note{font-size:13px;color:#bbb;margin-left:8px;}
  .small{padding:4px 8px;font-size:13px;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="controls">
        <button id="btnPlay" class="small">暂停</button>
        <input id="progress" type="range" min="0" max="100" value="0" />
        <select id="speed" class="small">
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2x</option>
        </select>
        <button id="btnLoop" class="small">循环: 开</button>
        <span class="note" id="status">初始化...</span>
      </div>
      <div style="margin-left:auto">
        <input id="demoUrl" style="width:420px;padding:6px;border-radius:6px;border:1px solid #333;background:#0b0b0b;color:#fff" placeholder="demo URL (示例: https://assets.haoping.me/.../data.html)" />
        <button id="loadBtn" class="small">加载</button>
      </div>
    </div>

    <div class="stage" id="stage">
      <iframe id="playerFrame" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
  </div>

<script>
(async function(){
  const params = new URLSearchParams(location.search);
  const demoParam = params.get('demo') || '';
  const demoInput = document.getElementById('demoUrl');
  const loadBtn = document.getElementById('loadBtn');
  const status = document.getElementById('status');
  const iframe = document.getElementById('playerFrame');

  const btnPlay = document.getElementById('btnPlay');
  const progress = document.getElementById('progress');
  const speed = document.getElementById('speed');
  const btnLoop = document.getElementById('btnLoop');

  let iframeWindow = null;
  let bridgeReady = false;
  let playing = true;
  let loop = true;

  if (demoParam) demoInput.value = demoParam;

  // 注入到 demo HTML 的桥脚本（字符串形式）
  const BRIDGE_SCRIPT = `
    <script>
    (function(){
      // 自动寻找 lottie 实例（常见变量名）
      const names = ['animation','anim','animItem','lottieAnim','player','animationItem'];
      function findInstance(){
        for (const n of names) {
          if (window[n] && typeof window[n].play === 'function') return window[n];
        }
        // 如果 demo 使用 lottie.loadAnimation 并返回实例到局部变量，可能无法找到
        return null;
      }

      // 控制器：接收父窗口消息并控制 lottie
      function setupBridge(anim){
        window.__LottieBridge = {
          play: ()=> anim.play && anim.play(),
          pause: ()=> anim.pause && anim.pause(),
          seekFrame: (f)=> { if (anim.goToAndStop) anim.goToAndStop(f, true); else if (anim.seek) anim.seek(f); },
          seekPercent: (p)=> { if (!anim.totalFrames) return; const f = Math.round(p * anim.totalFrames); if (anim.goToAndStop) anim.goToAndStop(f, true); },
          setSpeed: (s)=> anim.setSpeed && anim.setSpeed(s),
          setLoop: (b)=> { anim.loop = !!b; },
          getProgress: ()=> ({ progress: anim.totalFrames ? (anim.currentFrame/anim.totalFrames) : 0, currentFrame: anim.currentFrame || 0, totalFrames: anim.totalFrames || 0 })
        };
        // 订阅 enterFrame 更新
        try {
          if (anim.addEventListener) {
            anim.addEventListener('enterFrame', ()=> {
              const msg = { type:'__lottie_event', event:'frame', data: { currentFrame: anim.currentFrame, totalFrames: anim.totalFrames, progress: anim.totalFrames ? anim.currentFrame/anim.totalFrames : 0 } };
              window.parent.postMessage(msg, '*');
            });
            anim.addEventListener('DOMLoaded', ()=> window.parent.postMessage({ type:'__lottie_event', event:'ready', data:{ totalFrames: anim.totalFrames } }, '*'));
            anim.addEventListener('complete', ()=> window.parent.postMessage({ type:'__lottie_event', event:'ended', data:{} }, '*'));
          }
        } catch(e){}
        // notify parent bridge ready
        window.parent.postMessage({ type:'__lottie_event', event:'bridgeReady', data:{} }, '*');
      }

      // wait for animation instance or for demo to expose it
      (function waitForAnim(timeout=5000){
        const start = Date.now();
        (function tick(){
          const anim = findInstance();
          if (anim) { setupBridge(anim); return; }
          if (Date.now() - start > timeout) {
            // 尝试查找 lottie instances via lottie-web internal registry if available
            if (window.lottie && window.lottie.getRegisteredAnimations) {
              const regs = window.lottie.getRegisteredAnimations();
              if (regs && regs.length) {
                setupBridge(regs[0]);
                return;
              }
            }
            // give up
            window.parent.postMessage({ type:'__lottie_event', event:'bridgeFailed', data:{ message:'animation instance not found' } }, '*');
            return;
          }
          requestAnimationFrame(tick);
        })();
      })();

      // 接收父页面命令
      window.addEventListener('message', (e)=>{
        const msg = e.data;
        if (!msg || msg.type !== '__lottie_cmd') return;
        const cmd = msg.cmd;
        const v = msg.value;
        if (!window.__LottieBridge) return;
        switch(cmd){
          case 'play': window.__LottieBridge.play(); break;
          case 'pause': window.__LottieBridge.pause(); break;
          case 'seekPercent': window.__LottieBridge.seekPercent(v); break;
          case 'seekFrame': window.__LottieBridge.seekFrame(v); break;
          case 'setSpeed': window.__LottieBridge.setSpeed(v); break;
          case 'setLoop': window.__LottieBridge.setLoop(v); break;
          case 'getProgress':
            const p = window.__LottieBridge.getProgress();
            window.parent.postMessage({ type:'__lottie_event', event:'progress', data: p }, '*');
            break;
        }
      }, false);
    })();
    <\/script>
  `;

  // 把 fetched HTML 注入桥脚本并生成 blob URL
  async function makeWrappedBlobUrl(demoUrl){
    const res = await fetch(demoUrl, {cache:'no-store'});
    if (!res.ok) throw new Error('fetch failed: ' + res.status);
    let html = await res.text();

    // 在 </body> 前注入桥脚本；如果没有 body，则 append at end
    if (html.includes('</body>')) {
      html = html.replace('</body>', BRIDGE_SCRIPT + '</body>');
    } else {
      html += BRIDGE_SCRIPT;
    }

    // create blob url
    const blob = new Blob([html], { type: 'text/html' });
    return URL.createObjectURL(blob);
  }

  // 加载 demo：优先 fetch+inject（可控制），失败则直接 iframe.src = demoUrl（受限）
  async function loadDemo(demoUrl){
    status.innerText = '加载中...';
    bridgeReady = false;
    iframeWindow = null;
    try {
      const blobUrl = await makeWrappedBlobUrl(demoUrl);
      iframe.src = blobUrl;
      status.innerText = '已加载（注入桥脚本），等待桥就绪...';
      // iframe 同源（blob）可以直接访问 contentWindow
      iframe.onload = ()=> {
        iframeWindow = iframe.contentWindow;
        // wait for bridgeReady event from iframe
      };
    } catch (err) {
      console.warn('fetch/inject 失败，尝试直接加载 iframe（可能无法控制）', err);
      // 直接加载原始 URL（回退）
      iframe.src = demoUrl;
      status.innerText = '已直接加载（回退）。若无法控制，请使用代理或允许 CORS。';
      iframe.onload = ()=> { iframeWindow = iframe.contentWindow; };
    }
  }

  // 监听来自 iframe 的事件（bridgeReady / frame / progress / error）
  window.addEventListener('message', (e)=>{
    const msg = e.data;
    if (!msg || msg.type !== '__lottie_event') return;
    const ev = msg.event;
    const data = msg.data || {};
    if (ev === 'bridgeReady') {
      bridgeReady = true;
      status.innerText = '桥就绪，可控制';
      // request initial progress
      postCmd('getProgress');
    } else if (ev === 'bridgeFailed') {
      status.innerText = '桥初始化失败：' + (data.message || '');
    } else if (ev === 'frame' || ev === 'progress') {
      const pct = data.progress || 0;
      progress.value = Math.round(pct * 100);
    } else if (ev === 'ready') {
      status.innerText = '动画就绪，总帧数: ' + (data.totalFrames || '?');
    } else if (ev === 'ended') {
      status.innerText = '动画播放结束';
    }
  }, false);

  // 发送命令到 iframe（桥）
  function postCmd(cmd, value){
    const msg = { type: '__lottie_cmd', cmd, value };
    // if iframeWindow is available and same-origin (blob), use direct postMessage
    try {
      iframe.contentWindow.postMessage(msg, '*');
    } catch(e){
      console.warn('postMessage failed', e);
    }
  }

  // UI bindings
  btnPlay.addEventListener('click', ()=>{
    if (!bridgeReady) { status.innerText = '桥未就绪'; return; }
    if (playing) { postCmd('pause'); btnPlay.innerText = '播放'; }
    else { postCmd('play'); btnPlay.innerText = '暂停'; }
    playing = !playing;
  });

  progress.addEventListener('input', ()=>{
    if (!bridgeReady) { status.innerText = '桥未就绪'; return; }
    const pct = progress.value / 100;
    postCmd('seekPercent', pct);
    playing = false;
    btnPlay.innerText = '播放';
  });

  speed.addEventListener('change', ()=>{
    if (!bridgeReady) { status.innerText = '桥未就绪'; return; }
    const s = parseFloat(speed.value);
    postCmd('setSpeed', s);
  });

  btnLoop.addEventListener('click', ()=>{
    loop = !loop;
    postCmd('setLoop', loop);
    btnLoop.innerText = '循环: ' + (loop ? '开' : '关');
  });

  loadBtn.addEventListener('click', ()=> {
    const url = demoInput.value.trim();
    if (!url) return;
    loadDemo(url);
  });

  // 如果 URL 中有 demo 参数，自动加载
  if (demoInput.value) {
    loadDemo(demoInput.value);
  } else {
    status.innerText = '请输入 demo URL 并点击加载';
  }

})();
</script>
</body>
</html>
