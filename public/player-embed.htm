<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Player Embed — Lottie Demo Wrapper (简洁版)</title>

  <style>
    :root { --controls-height: 48px; }
    html,body { height:100%; margin:0; background:transparent; font-family: system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial; }
    #container { position:relative; width:100%; height:100vh; overflow:hidden; background:transparent; }
    iframe { width:100%; height:100%; border:0; display:block; background:transparent; z-index:1; }

    /* 点击捕获层：覆盖 iframe，用于接收点击与移动事件 */
    #clickOverlay {
      position:absolute;
      inset:0;
      z-index:5;
      background:transparent;
      pointer-events:auto;
    }

    /* 控制条：仅播放/暂停 + 进度条 */
    #controls {
      position:absolute;
      left:12px;
      right:12px;
      bottom:12px;
      height:var(--controls-height);
      display:flex;
      align-items:center;
      gap:10px;
      padding:8px 12px;
      background:rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
      border-radius:8px;
      z-index:9999;
      opacity:0;
      pointer-events:none;
      transition:opacity .25s ease;
    }

    /* 通过 JS 控制显示/隐藏（:hover 不再依赖） */
    #controls.visible { opacity:1; pointer-events:auto; }

    /* 进度条样式 */
    #progress {
      -webkit-appearance:none;
      appearance:none;
      width:100%;
      height:6px;
      background:linear-gradient(90deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.95) var(--pct,0%), rgba(255,255,255,0.12) var(--pct,0%), rgba(255,255,255,0.12) 100%);
      border-radius:999px;
      outline:none;
      cursor:pointer;
    }
    #progress::-webkit-slider-thumb{
      -webkit-appearance:none;
      appearance:none;
      width:14px;height:14px;border-radius:50%;
      background:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.3);border:2px solid rgba(0,0,0,0.08);
      margin-top:-4px;
    }
    #progress::-moz-range-thumb{
      width:14px;height:14px;border-radius:50%;background:#fff;border:2px solid rgba(0,0,0,0.08);
    }

    #toggle {
      padding:6px 12px;
      border:none;
      border-radius:6px;
      background:rgba(255,255,255,0.95);
      cursor:pointer;
      font-weight:600;
      white-space:nowrap;
    }

    @media (max-width:480px){
      #controls{ left:8px; right:8px; bottom:8px; padding:6px; gap:8px; }
      #toggle{ padding:6px 8px; font-size:14px; }
    }
  </style>
</head>
<body>
  <div id="container">
    <iframe id="playerFrame" sandbox="allow-scripts allow-same-origin"></iframe>

    <!-- 覆盖在 iframe 之上，用于捕获点击与移动（控制播放/隐藏逻辑） -->
    <div id="clickOverlay" aria-hidden="true"></div>

    <div id="controls" aria-hidden="false">
      <button id="toggle">暂停</button>
      <input id="progress" type="range" min="0" max="100" value="0" />
    </div>
  </div>

<script>
/*
  最终版 Wrapper Player（简洁）
  - 支持 ?demo=path 和 &bg=hex 或关键字
  - 注入桥脚并覆盖 data.html 的 body/#lottie 背景
  - 点击任意位置（除控制条外）切换播放/暂停
  - 进度条显示逻辑：
      * 鼠标移动时显示控制条
      * 鼠标停止移动 1s 后隐藏（即使仍在进度条上）
      * 鼠标离开容器后延迟 1s 隐藏
*/

(async function(){
  const ASSET_HOST = 'https://assets.haoping.me';
  const params = new URLSearchParams(location.search);
  const demoParam = params.get('demo') || params.get('file') || '';
  const bgParam = params.get('bg') || null;

  const iframe = document.getElementById('playerFrame');
  const container = document.getElementById('container');
  const overlay = document.getElementById('clickOverlay');
  const controls = document.getElementById('controls');
  const toggle = document.getElementById('toggle');
  const progress = document.getElementById('progress');

  let bridgeReady = false;
  let playing = true;
  let lastPct = 0;

  // 背景色处理（外层 + 注入内层）
  let bgCss = 'transparent';
  if (bgParam) {
    let bg = decodeURIComponent(bgParam);
    if (/^[0-9a-fA-F]{3}$/.test(bg)) bg = '#' + bg;
    if (/^[0-9a-fA-F]{6}$/.test(bg)) bg = '#' + bg;
    bgCss = bg;
  }
  document.documentElement.style.background = bgCss;
  document.body.style.background = bgCss;
  container.style.background = bgCss;

  // 桥脚（注入到 demo HTML）
  const BRIDGE_SCRIPT = `
    <script>
    (function(){
      const NAMES = ['animation','anim','animItem','lottieAnim','player','animationItem'];
      function findInstance() {
        for (const n of NAMES) {
          try { if (window[n] && typeof window[n].play === 'function') return window[n]; } catch(e){}
        }
        try {
          if (window.lottie && typeof window.lottie.getRegisteredAnimations === 'function') {
            const regs = window.lottie.getRegisteredAnimations();
            if (regs && regs.length) return regs[0];
          }
        } catch(e){}
        return null;
      }

      function setupBridge(anim){
        window.__LottieBridge = {
          play: ()=> anim.play && anim.play(),
          pause: ()=> anim.pause && anim.pause(),
          seekPercent: (p)=> { if (!anim.totalFrames) return; const f = Math.round(p * anim.totalFrames); if (anim.goToAndStop) anim.goToAndStop(f, true); else if (anim.seek) anim.seek(f); },
          getProgress: ()=> ({ progress: anim.totalFrames ? (anim.currentFrame/anim.totalFrames) : 0, currentFrame: anim.currentFrame || 0, totalFrames: anim.totalFrames || 0 })
        };

        try {
          if (anim.addEventListener) {
            anim.addEventListener('enterFrame', ()=> {
              const msg = { type:'__lottie_event', event:'frame', data:{ currentFrame: anim.currentFrame, totalFrames: anim.totalFrames, progress: anim.totalFrames ? anim.currentFrame/anim.totalFrames : 0 } };
              window.parent.postMessage(msg, '*');
            });
            anim.addEventListener('DOMLoaded', ()=> window.parent.postMessage({ type:'__lottie_event', event:'ready', data:{ totalFrames: anim.totalFrames } }, '*'));
            anim.addEventListener('complete', ()=> window.parent.postMessage({ type:'__lottie_event', event:'ended', data:{} }, '*'));
          }
        } catch(e){}
        window.parent.postMessage({ type:'__lottie_event', event:'bridgeReady', data:{} }, '*');
      }

      (function waitForAnim(timeout=4000){
        const start = Date.now();
        (function tick(){
          const anim = findInstance();
          if (anim) { setupBridge(anim); return; }
          if (Date.now() - start > timeout) {
            window.parent.postMessage({ type:'__lottie_event', event:'bridgeFailed', data:{ message:'animation instance not found' } }, '*');
            return;
          }
          requestAnimationFrame(tick);
        })();
      })();

      window.addEventListener('message', (e)=>{
        const msg = e.data;
        if (!msg || msg.type !== '__lottie_cmd') return;
        const cmd = msg.cmd;
        const v = msg.value;
        if (!window.__LottieBridge) return;
        switch(cmd){
          case 'play': window.__LottieBridge.play(); break;
          case 'pause': window.__LottieBridge.pause(); break;
          case 'seekPercent': window.__LottieBridge.seekPercent(v); break;
          case 'getProgress':
            const p = window.__LottieBridge.getProgress();
            window.parent.postMessage({ type:'__lottie_event', event:'progress', data: p }, '*');
            break;
        }
      }, false);
    })();
    <\/script>
  `;

  // 覆盖 data.html 中的背景样式（强制）
  const OVERRIDE_STYLE = `
    <style>
      html,body{background:${bgCss} !important;}
      #lottie{background:${bgCss} !important;}
    </style>
  `;

  function injectBaseAndBridge(htmlText, demoUrl) {
    const baseHref = demoUrl.substring(0, demoUrl.lastIndexOf('/') + 1);
    if (/<head[^>]*>/i.test(htmlText)) {
      htmlText = htmlText.replace(/<head([^>]*)>/i, `<head$1><base href="${baseHref}">${OVERRIDE_STYLE}`);
    } else {
      htmlText = '<head><base href="' + baseHref + '">' + OVERRIDE_STYLE + '</head>' + htmlText;
    }
    if (/<\/body>/i.test(htmlText)) {
      htmlText = htmlText.replace(/<\/body>/i, BRIDGE_SCRIPT + '</body>');
    } else {
      htmlText += BRIDGE_SCRIPT;
    }
    return htmlText;
  }

  async function makeWrappedBlobUrl(demoUrl) {
    const res = await fetch(demoUrl, { cache: 'no-store' });
    if (!res.ok) throw new Error('fetch failed: ' + res.status);
    let html = await res.text();
    html = injectBaseAndBridge(html, demoUrl);
    const blob = new Blob([html], { type: 'text/html' });
    return URL.createObjectURL(blob);
  }

  async function loadDemo(demoPathOrUrl) {
    bridgeReady = false;
    progress.value = 0;
    try {
      let demoUrl = demoPathOrUrl;
      if (!/^https?:\/\//i.test(demoUrl)) {
        demoUrl = ASSET_HOST.replace(/\/$/, '') + '/' + demoUrl.replace(/^\//, '');
      }
      const blobUrl = await makeWrappedBlobUrl(demoUrl);
      iframe.src = blobUrl;
      iframe.onload = ()=> { setTimeout(()=> URL.revokeObjectURL(blobUrl), 2000); };
    } catch (err) {
      let demoUrl = demoPathOrUrl;
      if (!/^https?:\/\//i.test(demoUrl)) {
        demoUrl = ASSET_HOST.replace(/\/$/, '') + '/' + demoUrl.replace(/^\//, '');
      }
      iframe.src = demoUrl;
    }
  }

  function postCmd(cmd, value) {
    const msg = { type: '__lottie_cmd', cmd, value };
    try { iframe.contentWindow.postMessage(msg, '*'); } catch(e){}
  }

  // 接收 iframe 事件
  window.addEventListener('message', (e) => {
    const msg = e.data;
    if (!msg || msg.type !== '__lottie_event') return;
    const ev = msg.event;
    const data = msg.data || {};
    if (ev === 'bridgeReady') {
      bridgeReady = true;
      postCmd('getProgress');
    } else if (ev === 'frame' || ev === 'progress') {
      const pct = data.progress || 0;
      lastPct = pct;
      progress.value = Math.round(pct * 100);
      progress.style.setProperty('--pct', (pct*100) + '%');
    }
  }, false);

  // 点击任意位置切换播放/暂停（overlay 捕获，controls 在上层，不会被拦截）
  overlay.addEventListener('pointerdown', (e) => {
    // 如果点击在控制条区域（controls 覆盖在 overlay 之上），则忽略（控制条会处理）
    const rect = controls.getBoundingClientRect();
    const x = e.clientX, y = e.clientY;
    if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
      return;
    }
    if (!bridgeReady) return;
    if (playing) { postCmd('pause'); toggle.innerText = '播放'; }
    else { postCmd('play'); toggle.innerText = '暂停'; }
    playing = !playing;
  });

  // 进度条交互
  progress.addEventListener('input', () => {
    if (!bridgeReady) return;
    const pct = progress.value / 100;
    postCmd('seekPercent', pct);
    playing = false;
    toggle.innerText = '播放';
  });

  // 控制按钮（也可点击）
  toggle.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!bridgeReady) return;
    if (playing) { postCmd('pause'); toggle.innerText = '播放'; }
    else { postCmd('play'); toggle.innerText = '暂停'; }
    playing = !playing;
  });

  // 显示/隐藏逻辑（满足：鼠标停止 1s 隐藏；离开 1s 隐藏；移动显示）
  let moveTimer = null;       // 用于检测鼠标停止 1s
  let leaveTimer = null;      // 用于离开后 1s 隐藏
  let controlsVisible = false;

  function showControls() {
    if (!controlsVisible) {
      controls.classList.add('visible');
      controlsVisible = true;
    }
    // reset timers
    if (moveTimer) { clearTimeout(moveTimer); moveTimer = null; }
    if (leaveTimer) { clearTimeout(leaveTimer); leaveTimer = null; }
    // start moveTimer: if no movement for 1s, hide controls (even if still over controls)
    moveTimer = setTimeout(() => {
      hideControls();
    }, 1000);
  }

  function hideControls() {
    if (controlsVisible) {
      controls.classList.remove('visible');
      controlsVisible = false;
    }
    if (moveTimer) { clearTimeout(moveTimer); moveTimer = null; }
    if (leaveTimer) { clearTimeout(leaveTimer); leaveTimer = null; }
  }

  // overlay 捕获 pointermove，显示 controls 并重置静止计时
  overlay.addEventListener('pointermove', (e) => {
    showControls();
  });

  // pointerenter/pointerleave 用于离开延迟隐藏
  overlay.addEventListener('pointerenter', (e) => {
    showControls();
  });
  overlay.addEventListener('pointerleave', (e) => {
    // 当鼠标离开 overlay（进入 iframe 之外），延迟 1s 隐藏
    if (leaveTimer) clearTimeout(leaveTimer);
    leaveTimer = setTimeout(() => {
      hideControls();
    }, 1000);
  });

  // 触摸设备：触摸时显示 controls briefly
  overlay.addEventListener('touchstart', (e) => {
    showControls();
  });

  // 初始显示一次
  showControls();

  // 自动在不可见时暂停（适合 Notion 中大量 embed 场景）
  const io = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!bridgeReady) return;
      if (entry.isIntersecting) {
        postCmd('play');
        toggle.innerText = '暂停';
        playing = true;
      } else {
        postCmd('pause');
        toggle.innerText = '播放';
        playing = false;
      }
    });
  }, { threshold: 0.05 });
  io.observe(container);

  // 自动加载 demo 参数（如果有）
  if (demoParam) {
    loadDemo(demoParam);
  }

  // expose minimal debug API
  window.__PlayerEmbed = {
    load: loadDemo,
    play: ()=> postCmd('play'),
    pause: ()=> postCmd('pause'),
    seekPercent: (p)=> postCmd('seekPercent', p)
  };

})();
</script>
</body>
</html>
