<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: transparent; /* 默认透明 */
    }

    #lottie {
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="lottie"></div>

  <script>
    const params = new URLSearchParams(window.location.search)

    let file = params.get('file')
    const loop = params.get('loop') !== 'false'
    const autoplay = params.get('autoplay') !== 'false'
    const speed = parseFloat(params.get('speed') || '1')
    const bg = params.get('bg') || 'transparent'

    // 背景逻辑
    let finalBg = 'transparent'
    if (bg === 'light') {
      finalBg = '#ffffff'
    } else if (bg !== 'transparent') {
      finalBg = bg
    }
    document.body.style.background = finalBg

    // 自动补全相对路径 → R2 自定义域名
    const R2_DOMAIN = 'https://assets.haoping.me'
    if (file && !file.startsWith('http://') && !file.startsWith('https://')) {
      // 变成完整 URL
      file = `${R2_DOMAIN}/${file}`
    }

    if (!file) {
      console.error('Missing ?file= URL')
    } else {
      const anim = lottie.loadAnimation({
        container: document.getElementById('lottie'),
        renderer: 'svg',
        loop,
        autoplay,
        path: file
      })

      anim.setSpeed(speed)
    }
  </script>
</body>
</html>
